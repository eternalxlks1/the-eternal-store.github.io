<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Eternal Store - Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="icon" href="https://the-eternal-store.github.io/favicon.ico" type="image/x-icon">
  </head>

  <body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-dark px-3 sticky-top">
      <span class="navbar-brand">Cart</span>

      <div class="d-flex gap-2">
        <a class="btn btn-outline-light btn-sm" href="index.html">Home</a>
        <a class="btn btn-outline-light btn-sm" href="https://the-eternal-store.github.io/">Store</a>
      </div>
    </nav>

    <!-- HEADER -->
    <div class="container mt-4 text-center">
      <h1>Your Cart</h1>
      <p class="text-muted">Items stored locally in your browser</p>

      <button class="btn btn-danger" onclick="clearCart()">Clear Cart</button>
    </div>

    <!-- CART ITEMS -->
    <div class="container mt-4">
      <ul class="list-group" id="cart"></ul>
    </div>

    <!-- BACK -->
    <div class="container text-center mt-4">
      <a href="index.html" class="btn btn-primary">Continue Shopping</a>
    </div>

    <script>
      // init cart
      if (!localStorage.itemsInCart) {
        localStorage.itemsInCart = JSON.stringify({})
      }

      function loadCart() {
        const cartEl = document.getElementById("cart")
        const cart = JSON.parse(localStorage.itemsInCart)
        let html = ""

        for (const item in cart) {
          const count = cart[item][0]
          const dollars = cart[item][1]
          const cents = cart[item][2]

          html += `
            <li class="list-group-item">
              <strong>${item}</strong><br>
              Count: ${count}<br>
              Price: $${dollars}.${cents}
              <div class="mt-2">
                <button class="btn btn-sm btn-danger" onclick="removeItem('${item}')">Remove All</button>
                <button class="btn btn-sm btn-warning" onclick="removeOne('${item}')">Remove One</button>
              </div>
            </li>
          `
        }

        if (html === "") {
          html = `<li class="list-group-item text-muted">Your cart is empty.</li>`
        }

        cartEl.innerHTML = html
      }

      function clearCart() {
        if (confirm("Clear entire cart?")) {
          localStorage.itemsInCart = JSON.stringify({})
          loadCart()
        }
      }

      function removeItem(item) {
        const cart = JSON.parse(localStorage.itemsInCart)
        delete cart[item]
        localStorage.itemsInCart = JSON.stringify(cart)
        loadCart()
      }

      function removeOne(item) {
        const cart = JSON.parse(localStorage.itemsInCart)

        if (!cart[item]) return

        if (cart[item][0] <= 1) {
          delete cart[item]
        } else {
          cart[item][0] -= 1
        }

        localStorage.itemsInCart = JSON.stringify(cart)
        loadCart()
      }

      loadCart()
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
