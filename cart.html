<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">

    <link href="https://the-eternal-store.github.io/favicon.ico" rel="icon" type="image/x-icon">
  </head>

  <body>
    <nav id="navbar-example" class="navbar navbar-light bg-light px-3 sticky-top" data-bs-offset="0">
      <h1><a class="navbar-brand" href="#">The Eternal Store</a></h1>

      <ul class="nav nav-pills">
        <li class="nav-item">
          <a class="nav-link" href="https://brunozhon.github.io">Bruno Zhong's Website</a>
        </li>

        <li class="nav-item">
          <form class="d-flex">
            <input class="form-control me-2" type="search" placeholder="Search my website..." aria-label="Search" name="search_query">
            <button class="btn btn-outline-success" type="submit">Search</button>
          </form>
        </li>
      </ul>
    </nav>

    <audio autoplay controls loop>
      <source src="https://the-eternal-store.github.io/The%20Eternal%20Store.wav" type="audio/wav">
      <source src="https://the-eternal-store.github.io/The%20Eternal%20Store.aiff" type="audio/aiff">
    </audio>

    <h1>My Cart</h1>

    <p>
      <button class="btn btn-danger" onclick="deleteCart()">Delete All Items In Cart</button>
    </p>

    <ul class="list-group" id="cart"></ul>

    <p><a href="https://the-eternal-store.github.io/">Browse more!</a></p>

    <div class="card">
      <div class="card-body">
        <p class="card-text">
          <a class="link-underline link-underline-opacity-0" href="https://github.com/the-bruno-store">
            <!-- GitHub icon -->
            @the-bruno-store
          </a>

          <a class="link-underline link-underline-opacity-0" href="https://github.com/Brunozhon">
            <!-- GitHub icon -->
            @Brunozhon
          </a>

          <a href="https://the-eternal-store.github.io/v1.0.0/">v1.0.0</a>
        </p>
      </div>
    </div>

    <script>
      if (!localStorage.itemsInCart) {
        localStorage.itemsInCart = JSON.stringify({})
      }

      var params = new URLSearchParams(location.search)
      var cart = params.get("cart")

      function addItem(item, dollars, cents) {
        var realCart = JSON.parse(localStorage.itemsInCart)
        if (realCart[item]) {
          realCart[item][0] += 1
          realCart[item][1] = dollars * realCart[item][0]
          realCart[item][2] = cents * realCart[item][0]

          while (realCart[item][2] > 99) {
            realCart[item][2] -= 100
            realCart[item][1] += 1
          }
        } else {
          realCart[item] = [1, dollars, cents]
        }
        localStorage.itemsInCart = JSON.stringify(realCart)
      }

      function deleteCart() {
        if (confirm("Do you want to delete all the items in your cart?")) {
          localStorage.itemsInCart = JSON.stringify({})
          location.replace("https://the-eternal-store.github.io/cart.html")
        }
      }

      function deleteItem(item) {
        if (confirm(`Do you want to delete ALL OF the item ${item}?`)) {
          var realCart = JSON.parse(localStorage.itemsInCart)
          delete realCart[item]
          localStorage.itemsInCart = JSON.stringify(realCart)
          location.replace("https://the-eternal-store.github.io/cart.html")
        }
      }

      function deleteOneOf(item) {
        if (confirm(`Do you want to delete one of the item ${item}?`)) {
          var realCart = JSON.parse(localStorage.itemsInCart)

          if (realCart[item][0] == 1) {
            delete realCart[item]
          } else {
            let moneyCalc = (realCart[item][1] * 100 + realCart[item][2]) / realCart[item][0]
            realCart[item][0] -= 1
            let total = moneyCalc * realCart[item][0]
            realCart[item][1] = 0

            while (total > 99) {
              total -= 100
              realCart[item][1] += 1
            }

            realCart[item][2] = total
          }

          localStorage.itemsInCart = JSON.stringify(realCart)
          location.replace("https://the-eternal-store.github.io/cart.html")
        }
      }

      var html = ""
      var cartItems = JSON.parse(localStorage.itemsInCart)

      for (const item in cartItems) {
        html += `<li class="list-group-item">${item}; Count: ${cartItems[item][0]}; Cost: $${cartItems[item][1]}.${cartItems[item][2]}</li>`
        html += `<li><button onclick="deleteItem('${item}')">Delete All Of This</button></li>`
        html += `<li><button onclick="deleteOneOf('${item}')">Delete One Of This</button></li>`
      }

      document.getElementById("cart").innerHTML = html

      // cart logic (unchanged mapping)
      if (cart == "lead-1-pack") addItem("Lead (1-PACK)", 0, 6)
      else if (cart == "lead-5-pack") addItem("Lead (5-PACK)", 0, 30)
      else if (cart == "lead-10-pack") addItem("Lead (10-PACK)", 0, 59)
      else if (cart == "lead-25-pack") addItem("Lead (25-PACK)", 1, 23)
      else if (cart == "lead-100-pack") addItem("Lead (100-PACK)", 4, 90)
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
